<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Camp Rental - Go Outside!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .hero-section { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1504280390467-36cb0a173872?q=80') center/cover; padding: 100px 0; color: white; text-align: center; }
        .booking-bar { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: -50px; position: relative; z-index: 10; }
        .card-img-top { height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .btn-custom { background-color: #2c4c3b; color: white; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar bg-white shadow-sm py-3"><div class="container"><a class="navbar-brand fw-bold text-success" href="/"><i class="bi bi-tree-fill"></i> CAMP RENTAL</a><a href="/admin" class="btn btn-outline-success btn-sm">Admin</a></div></nav>
    <div class="hero-section"><div class="container"><h1 class="display-5 fw-bold">Petualangan Dimulai Dari Sini.</h1></div></div>
    <div class="container booking-bar">
        <form action="/hitung" method="post" class="row g-2 align-items-end">
            <div class="col-md-3"><label class="form-label small fw-bold">Pilih Barang</label><select name="alatNama" class="form-select" required><optgroup th:each="kat : ${kategoriList}" th:label="${kat}"><option th:each="a : ${daftarAlat}" th:if="${a.kategori == kat}" th:value="${a.nama}" th:text="${a.nama}"></option></optgroup></select></div>
            <div class="col-md-2"><label class="form-label small fw-bold">Tgl Ambil</label><input type="date" name="tglAmbil" class="form-control" required></div>
            <div class="col-md-1"><label class="form-label small fw-bold">Qty</label><input type="number" name="jumlah" class="form-control" value="1" min="1" required></div>
            <div class="col-md-2"><label class="form-label small fw-bold">Durasi</label><select name="durasi" class="form-select"><option value="1">1 Hari</option><option value="2">2 Hari</option><option value="3">3 Hari</option></select></div>
            <div class="col-md-2"><label class="form-label small fw-bold">Pengiriman</label><select name="pengiriman" class="form-select"><option value="Ambil di Toko">Ambil di Toko</option><option value="Kurir Lokal">Kurir Lokal</option></select></div>
            <div class="col-md-2"><button type="submit" class="btn btn-custom w-100">Cek Harga</button></div>
        </form>
    </div>
    <div class="container mt-4" th:if="${total != null}"><div class="alert alert-success d-flex justify-content-between align-items-center shadow-sm"><div><h5 class="mb-1"><i class="bi bi-check-circle-fill"></i> <span th:text="${terpilih.nama}"></span> (<span th:text="${jumlah}"></span>x)</h5><small>Ambil: <span th:text="${tglAmbil}"></span> | Durasi: <span th:text="${durasi} + ' Hari'"></span> | <span th:text="${pengiriman}"></span></small></div><h3 class="fw-bold text-success mb-0">Rp <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></span></h3></div></div>
    <div class="container py-5"><div class="row g-4"><div class="col-md-3" th:each="alat : ${daftarAlat}"><div class="card h-100 border-0 shadow-sm"><img th:src="${alat.imageUrl}" class="card-img-top"><div class="card-body"><span class="badge bg-light text-dark border mb-2" th:text="${alat.kategori}"></span><h6 class="fw-bold" th:text="${alat.nama}"></h6><span class="text-success fw-bold" th:text="'Rp ' + ${#numbers.formatDecimal(alat.harga, 0, 'COMMA', 0, 'POINT')} + '/hr'"></span></div></div></div></div></div>
</body>
</html>
