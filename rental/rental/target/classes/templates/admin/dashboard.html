<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Admin - Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"></head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4"><div class="container"><a class="navbar-brand" href="/admin">Manajemen Inventaris</a><div class="d-flex gap-2"><a href="/" class="btn btn-outline-light btn-sm">Lihat Web</a><form action="/logout" method="post"><button type="submit" class="btn btn-danger btn-sm">Logout</button></form></div></div></nav>
    <div class="container bg-white p-4 rounded shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3"><h4>Daftar Alat</h4><a href="/admin/tambah" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Tambah</a></div>
        <table class="table table-hover align-middle"><thead class="table-light"><tr><th>Nama</th><th>Kategori</th><th>Harga</th><th class="text-center">Aksi</th></tr></thead>
            <tbody><tr th:each="alat : ${daftarAlat}"><td th:text="${alat.nama}"></td><td th:text="${alat.kategori}"></td><td th:text="'Rp ' + ${#numbers.formatDecimal(alat.harga, 0, 'COMMA', 0, 'POINT')}"></td><td class="text-center"><a th:href="@{/admin/edit/{id}(id=${alat.id})}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a> <a th:href="@{/admin/hapus/{id}(id=${alat.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Hapus?')"><i class="bi bi-trash"></i></a></td></tr></tbody>
        </table>
    </div>
</body>
</html>
