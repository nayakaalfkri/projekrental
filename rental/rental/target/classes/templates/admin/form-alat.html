<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Form Alat</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
    <div class="container mt-5"><div class="row justify-content-center"><div class="col-md-6 bg-white p-4 rounded shadow-sm">
        <h4 th:text="${alat.id == null ? 'Tambah Alat' : 'Edit Alat'}"></h4><hr>
        <form action="/admin/simpan" method="post" th:object="${alat}"><input type="hidden" th:field="*{id}">
            <div class="mb-3"><label class="form-label">Nama</label><input type="text" th:field="*{nama}" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Kategori</label><select th:field="*{kategori}" class="form-select" required><option value="Tenda & Shelter">Tenda & Shelter</option><option value="Perlengkapan Tidur">Perlengkapan Tidur</option><option value="Alat Masak & Makan">Alat Masak & Makan</option></select></div>
            <div class="mb-3"><label class="form-label">Harga/Hari</label><input type="number" th:field="*{harga}" class="form-control" required></div>
            <div class="mb-4"><label class="form-label">URL Gambar (Unsplash dll)</label><input type="text" th:field="*{imageUrl}" class="form-control" required></div>
            <div class="d-flex justify-content-between"><a href="/admin" class="btn btn-secondary">Batal</a><button type="submit" class="btn btn-primary">Simpan</button></div>
        </form>
    </div></div></div>
</body>
</html>
